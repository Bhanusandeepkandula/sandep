<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08080F" />
    <title>Smart Expense Tracker</title>
    <style>
      /* Lock viewport height — only inner main scrolls; body must not scroll or fixed nav “moves” with the page */
      html {
        -webkit-text-size-adjust: 100%;
        background: #08080f;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        margin: 0;
        background: #08080f;
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        overflow: hidden;
        overscroll-behavior: none;
      }
      #root {
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        max-height: 100dvh;
        max-height: -webkit-fill-available;
        display: flex;
        flex-direction: column;
        width: 100%;
        overflow: hidden;
        background: #08080f;
      }
      /* Prevent iOS Safari auto-zoom on input focus — minimum 16px */
      @media screen and (max-width: 768px) {
        input, textarea, select { font-size: 16px !important; }
      }

      /* Boneyard shimmer */
      @keyframes bone-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

      /* ── Splash screen ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #08080f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.45s ease-out;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .logo-ring {
        width: 72px; height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, #22c55e 0%, #60a5fa 100%);
        display: flex; align-items: center; justify-content: center;
        animation: splash-pop 0.6s ease-out;
      }
      #splash .logo-inner {
        width: 58px; height: 58px;
        border-radius: 50%;
        background: #08080f;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 900; color: #22c55e;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #splash .splash-title {
        font-size: 22px; font-weight: 800; color: #eef0ff;
        letter-spacing: -0.5px;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        animation: splash-fade-up 0.5s ease-out 0.15s both;
      }
      #splash .splash-dots {
        display: flex; gap: 6px;
        animation: splash-fade-up 0.5s ease-out 0.3s both;
      }
      #splash .splash-dots span {
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(34,197,94,0.5);
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      #splash .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #splash .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splash-pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes splash-fade-up { 0% { transform: translateY(8px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
        40% { transform: scale(1.6); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — visible instantly, hidden after React mounts -->
    <div id="splash">
      <div class="logo-ring"><div class="logo-inner">₹</div></div>
      <div class="splash-title">Track</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
