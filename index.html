<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#060610" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Track" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Track</title>
    <script>
      /* Paint the html/body/splash with the user's saved theme colour BEFORE
       * React mounts. Prevents a flash of pure-black on cold load and kills
       * the "black bar at the bottom" where the PWA's home-indicator zone
       * would otherwise show through as #000000.
       * Must stay in sync with THEMES in src/config.js. */
      (function () {
        var THEMES = {
          default:   { bg: "#060610", card: "#12122A", txt: "#F1F1F8", sub: "rgba(235,235,245,0.50)", statusBar: "black-translucent" },
          midnight:  { bg: "#04070E", card: "#0B1220", txt: "#DEE5F0", sub: "rgba(222,229,240,0.45)", statusBar: "black-translucent" },
          grey:      { bg: "#070707", card: "#141414", txt: "#E4E4E4", sub: "rgba(228,228,228,0.45)", statusBar: "black-translucent" },
          jetblack:  { bg: "#000000", card: "#0A0A0A", txt: "#ECECEC", sub: "rgba(236,236,236,0.45)", statusBar: "black-translucent" },
          light:     { bg: "#F4F5F8", card: "#FFFFFF", txt: "#18182B", sub: "rgba(24,24,43,0.55)",   statusBar: "default" },
          lightblue: { bg: "#F6F9FF", card: "#FFFFFF", txt: "#0F172A", sub: "rgba(15,23,42,0.55)",   statusBar: "default" }
        };
        var id = "default";
        try { id = localStorage.getItem("track_theme") || "default"; } catch (e) {}
        var t = THEMES[id] || THEMES.default;
        var root = document.documentElement;
        root.style.background = t.card;
        root.setAttribute("data-theme", id);
        /* Store on root so inline CSS below can reference it as a CSS var. */
        root.style.setProperty("--boot-bg", t.bg);
        root.style.setProperty("--boot-card", t.card);
        root.style.setProperty("--boot-txt", t.txt);
        root.style.setProperty("--boot-sub", t.sub);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", t.bg);
        var sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (sb) sb.setAttribute("content", t.statusBar);
      })();
    </script>
    <style>
      /* ── Full-height app shell — body never scrolls ── */
      html {
        -webkit-text-size-adjust: 100%;
        background: var(--boot-card, #12122A);
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        margin: 0;
        background: var(--boot-bg, #060610);
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      }
      /* Allow text selection only in inputs and editable content */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }
      #root {
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        max-height: 100dvh;
        max-height: -webkit-fill-available;
        display: flex;
        flex-direction: column;
        width: 100%;
        overflow: hidden;
        background: var(--boot-bg, #060610);
      }

      /* ── Native-feel interactions ── */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      button, a {
        touch-action: manipulation;
        cursor: pointer;
      }
      /* Smooth momentum scrolling in all scroll containers */
      [style*="overflow"] {
        -webkit-overflow-scrolling: touch;
      }

      /* ── Prevent iOS auto-zoom on focus ── */
      @media screen and (max-width: 768px) {
        input, textarea, select { font-size: 16px !important; }
      }

      /* ── Hide scrollbars but keep scroll ── */
      ::-webkit-scrollbar { width: 0; height: 0; }
      * { scrollbar-width: none; }

      /* ── Standalone PWA adjustments ── */
      @media (display-mode: standalone) {
        body { position: fixed; width: 100%; }
      }

      /* ── Animations ── */
      @keyframes bone-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
      @keyframes tab-enter {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes toast-in {
        from { opacity: 0; transform: translateY(-20px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes toast-out {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to   { opacity: 0; transform: translateY(-16px) scale(0.95); }
      }
      @keyframes sheet-up {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .spin { animation: spin-360 .8s linear infinite; }
      .pop  { animation: scale-in .3s cubic-bezier(.34,1.56,.64,1); }
      @keyframes spin-360 {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes ptr-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes scale-in {
        from { opacity: 0; transform: scale(0.95) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes slide-right {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      /* ── iOS 26 Splash screen ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: var(--boot-bg, #060610);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        transition: opacity 0.50s cubic-bezier(0.22,1,0.36,1);
        overflow: hidden;
      }
      /* Mesh background orbs */
      #splash::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 55% at 15% 20%, rgba(48,209,88,0.14) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 85% 70%, rgba(10,132,255,0.10) 0%, transparent 55%),
          radial-gradient(ellipse 50% 40% at 50% 95%, rgba(191,90,242,0.08) 0%, transparent 50%);
        animation: splash-mesh 4s ease-in-out infinite alternate;
      }
      @keyframes splash-mesh {
        0%   { opacity: 0.7; transform: scale(1); }
        100% { opacity: 1;   transform: scale(1.05); }
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      /* App icon — frosted glass disc */
      #splash .logo-ring {
        width: 88px; height: 88px;
        border-radius: 28px;
        background: rgba(255,255,255,0.07);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.14);
        box-shadow: 0 8px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.12);
        display: flex; align-items: center; justify-content: center;
        animation: splash-pop 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
        position: relative;
        z-index: 1;
      }
      #splash .logo-inner {
        width: 60px; height: 60px;
        border-radius: 18px;
        background: linear-gradient(145deg, #30d158 0%, #0a84ff 100%);
        display: flex; align-items: center; justify-content: center;
        font-size: 30px; font-weight: 900; color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        letter-spacing: -1px;
        box-shadow: 0 4px 16px rgba(48,209,88,0.35);
      }
      #splash .splash-title {
        font-size: 24px; font-weight: 800; color: var(--boot-txt, #ffffff);
        letter-spacing: -0.6px;
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        animation: splash-fade-up 0.5s cubic-bezier(0.22,1,0.36,1) 0.18s both;
        position: relative; z-index: 1;
      }
      #splash .splash-sub {
        font-size: 14px; font-weight: 500;
        color: var(--boot-sub, rgba(235,235,245,0.50));
        letter-spacing: -0.1px;
        font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        animation: splash-fade-up 0.5s cubic-bezier(0.22,1,0.36,1) 0.28s both;
        position: relative; z-index: 1;
        margin-top: -14px;
      }
      #splash .splash-dots {
        display: flex; gap: 5px;
        animation: splash-fade-up 0.5s cubic-bezier(0.22,1,0.36,1) 0.38s both;
        position: relative; z-index: 1;
      }
      #splash .splash-dots span {
        width: 5px; height: 5px; border-radius: 50%;
        background: rgba(48,209,88,0.6);
        animation: splash-bounce 1.1s ease-in-out infinite;
      }
      #splash .splash-dots span:nth-child(2) { animation-delay: 0.14s; background: rgba(10,132,255,0.6); }
      #splash .splash-dots span:nth-child(3) { animation-delay: 0.28s; background: rgba(191,90,242,0.6); }
      @keyframes splash-pop {
        0%   { transform: scale(0.55) rotate(-8deg); opacity: 0; }
        70%  { transform: scale(1.06) rotate(2deg); }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      @keyframes splash-fade-up {
        0%   { transform: translateY(14px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(1);   opacity: 0.5; }
        40%            { transform: scale(1.7); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo-ring"><div class="logo-inner">T</div></div>
      <div class="splash-title">Track</div>
      <div class="splash-sub">Expense Manager</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
