# GitHub Pages — project sites live at https://<user>.github.io/<repo>/
# Vite needs base = /<repo>/ so JS/CSS load correctly (fixes 404 on assets).
# If your repo is <user>.github.io (user/org root site at https://<user>.github.io/),
# set VITE_BASE_PATH: / in the Build step env instead of the default below.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_BASE_PATH: /sandep/
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
        run: npm run build
      - name: Show built index.html
        run: cat dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
