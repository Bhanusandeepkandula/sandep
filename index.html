<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08080F" />
    <title>Smart Expense Tracker</title>
    <style>
      /* Lock viewport height — only inner main scrolls; body must not scroll or fixed nav “moves” with the page */
      html {
        -webkit-text-size-adjust: 100%;
        background: #08080f;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        margin: 0;
        background: #08080f;
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        overflow: hidden;
        overscroll-behavior: none;
      }
      #root {
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        max-height: 100dvh;
        max-height: -webkit-fill-available;
        display: flex;
        flex-direction: column;
        width: 100%;
        overflow: hidden;
        background: #08080f;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
