<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#060610" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Track" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Track</title>
    <style>
      /* ── Full-height app shell — body never scrolls ── */
      html {
        -webkit-text-size-adjust: 100%;
        background: #060610;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }
      body {
        margin: 0;
        background: #060610;
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Allow text selection only in inputs and editable content */
      input, textarea, [contenteditable] {
        -webkit-user-select: text;
        user-select: text;
      }
      #root {
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        max-height: 100dvh;
        max-height: -webkit-fill-available;
        display: flex;
        flex-direction: column;
        width: 100%;
        overflow: hidden;
        background: #060610;
      }

      /* ── Native-feel interactions ── */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      button, a {
        touch-action: manipulation;
        cursor: pointer;
      }
      /* Smooth momentum scrolling in all scroll containers */
      [style*="overflow"] {
        -webkit-overflow-scrolling: touch;
      }

      /* ── Prevent iOS auto-zoom on focus ── */
      @media screen and (max-width: 768px) {
        input, textarea, select { font-size: 16px !important; }
      }

      /* ── Hide scrollbars but keep scroll ── */
      ::-webkit-scrollbar { width: 0; height: 0; }
      * { scrollbar-width: none; }

      /* ── Standalone PWA adjustments ── */
      @media (display-mode: standalone) {
        body { position: fixed; width: 100%; }
      }

      /* ── Animations ── */
      @keyframes bone-shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
      @keyframes tab-enter {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Splash screen ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #060610;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.45s ease-out;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash .logo-ring {
        width: 72px; height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, #22c55e 0%, #60a5fa 100%);
        display: flex; align-items: center; justify-content: center;
        animation: splash-pop 0.6s ease-out;
      }
      #splash .logo-inner {
        width: 58px; height: 58px;
        border-radius: 50%;
        background: #060610;
        display: flex; align-items: center; justify-content: center;
        font-size: 28px; font-weight: 900; color: #22c55e;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #splash .splash-title {
        font-size: 22px; font-weight: 800; color: #eef0ff;
        letter-spacing: -0.5px;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        animation: splash-fade-up 0.5s ease-out 0.15s both;
      }
      #splash .splash-dots {
        display: flex; gap: 6px;
        animation: splash-fade-up 0.5s ease-out 0.3s both;
      }
      #splash .splash-dots span {
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(34,197,94,0.5);
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      #splash .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #splash .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splash-pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes splash-fade-up { 0% { transform: translateY(8px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
        40% { transform: scale(1.6); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo-ring"><div class="logo-inner">T</div></div>
      <div class="splash-title">Track</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
